name: Daily Amazon feed

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to refresh (placeholder for future per-source-type splits)"
        required: false
        default: "all"
        type: choice
        options:
          - all

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: node scripts/audit-sources.js --dry-run --quiet
      # Refreshes the deterministic raw feed snapshot only. The editorial digest
      # (digest/*.md) is produced by the agent on demand. state-feed.json is
      # per-install runtime state (gitignored) and is intentionally NOT committed
      # — shipping it would pre-mark every item seen and empty new users' digests.
      - run: node scripts/prepare-digest.js --quiet --ignore-state
      - name: Commit generated feed
        run: |
          if git diff --quiet -- data/feed-amazon.json; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed-amazon.json
          git commit -m "chore: update daily amazon feed [skip ci]"
          git push
